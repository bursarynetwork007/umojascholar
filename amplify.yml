version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
        # Decode Cognito config injected as a secret env var — never committed to git
        - echo "$AMPLIFY_OUTPUTS_B64" | base64 -d > amplify_outputs.json
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - .next/cache/**/*
      - .npm/**/*
      - node_modules/**/*
